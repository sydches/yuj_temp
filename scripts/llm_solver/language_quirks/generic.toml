# Task format descriptor: generic verification-looking commands
#
# Matches any bash command starting with a word that conventionally
# denotes a verification step. Broad by design — use when the task
# environment has no single canonical runner, or when analyzing
# mixed-domain runs.
# False positives are expected.

name = "generic"
description = "Generic verify/test/check/build invocations"

verification_patterns = [
    '''(?:^|[\s/'"])(?:test|check|verify|validate|lint)\b''',
    '''(?:^|[\s/'"])(?:make|cmake|ninja|bazel)\b''',
]

