# Task format descriptor: C/C++ ctest / make test
#
# Matches ctest invocations and `make test`/`make check` — the
# conventional verification commands for CMake and Autotools projects.

name = "ctest"
description = "ctest / make test / make check invocations"

verification_patterns = [
    '''(?:^|[\s/'"])ctest\b''',
    '''(?:^|[\s/'"])make\s+(?:test|check)\b''',
]

