mode = "both"

[knob."tools.edit_fuzzy_cascade_enabled"]
type = "bool"
default = false
description = "Auto-apply first passing strategy from the fuzzy replacer cascade (indent/whitespace/escape normalization)."
tags = ["edit", "toggle", "experimental"]
blast_radius = "medium"
mode = "both"

[knob."tools.edit_candidate_count"]
type = "int"
default = 3
description = "How many near-miss candidates to return when edit_strict_match=true and exact match misses."
tags = ["edit"]
blast_radius = "low"
mode = "both"

[knob."tools.llama_server_bin"]
type = "str"
default = "~/.local/bin/llama-server"
description = "llama-server binary path. Override in config.local.toml."
tags = ["server", "model"]
blast_radius = "low"
mode = "both"

[knob."tools.bwrap_bin"]
type = "str"
default = "/usr/bin/bwrap"
description = "bubblewrap binary path for bash sandboxing."
tags = ["safety", "tools"]
blast_radius = "low"
mode = "both"

