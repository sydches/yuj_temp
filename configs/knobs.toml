# configs/knobs.toml — knob catalog (single source of truth)
#
# Purpose: one machine-readable file describing every tunable in the
# harness. Consumed by scripts/knob.py (CLI), .claude/skills/harness-tune/
# (intent → config skill), and configs/README.md.
#
# Maintained by:
#   1. scripts/build_knob_catalog.py build    — merges skeleton entries
#      for new config.toml keys without overwriting curation below.
#   2. scripts/build_knob_catalog.py validate — CI check; fails if a
#      config.toml key is missing from this file.
#
# Fields per knob (in [knob."<dot.path>"] sections):
#   type          python type (str/int/float/bool/list)
#   default       value from config.toml
#   description   one-line human-readable explanation
#   tags          topical tags (see §Tags below)
#   blast_radius  low  — safe to flip, reversible
#                 medium — changes behavior meaningfully; review the diff
#                 high — changes the independent variable, corrupts
#                        reproducibility, or broad side-effects; the
#                        skill requires typed confirmation
#   mode          measurement | assistant | both — which entry point
#                 may mutate this knob
#   range         [min, max] for numeric (optional)
#   values        [allowed] for enums (optional)
#   implies       [related_knob, ...] (optional)
#   affects       [observable_effects] (freeform, optional)
#   curation_pending = true  — skeleton entry awaiting hand-authoring
#
# Tags vocabulary:
#   safety, guardrail, context, output-hygiene, bash-quirks, edit, model,
#   server, post-edit, injections, prompt-text, timing, toggle,
#   experimental, observability, tools, budget, reproducibility
#
# Curation status: high-impact knobs are hand-tagged below. Remaining
# entries are mechanically generated by build_knob_catalog.py and
# marked `curation_pending = true` until hand-authored.

# ═══════════════════════════════════════════════════════════════════
# Runtime mode
# ═══════════════════════════════════════════════════════════════════

[knob."runtime.mode"]
type = "str"
default = "measurement"
description = "Entry-point mode gate. measurement locks out assistant-only behavior; assistant enables session-shell features."
tags = ["safety", "reproducibility", "tools"]
blast_radius = "high"
mode = "both"
values = ["measurement", "assistant"]
affects = ["entrypoint-behavior", "assistant-shell", "measurement-integrity"]

# ═══════════════════════════════════════════════════════════════════
# Loop guardrails
# ═══════════════════════════════════════════════════════════════════

[knob."loop.max_turns"]
type = "int"
default = 200
description = "Hard cap on tool-call turns per session before forced end. Higher = more runway, more cost."
tags = ["budget", "guardrail"]
blast_radius = "medium"
mode = "both"
range = [10, 1000]
affects = ["wall-clock", "token-spend"]

[knob."loop.max_sessions"]
type = "int"
default = 10
description = "Max session restarts per task. Each session gets fresh context."
tags = ["budget", "guardrail"]
blast_radius = "medium"
mode = "both"
range = [1, 20]

[knob."loop.require_intent"]
type = "bool"
default = false
description = "Intent gate. When true, silent tool calls (no reasoning text) are rejected after grace period."
tags = ["guardrail", "toggle"]
blast_radius = "medium"
mode = "both"
implies = ["loop.intent_grace_turns", "loop.intent_abort_threshold"]

[knob."loop.intent_grace_turns"]
type = "int"
default = 3
description = "Grace period (turns) before the intent gate starts enforcing."
tags = ["guardrail", "budget"]
blast_radius = "low"
mode = "both"
range = [0, 20]

[knob."loop.intent_abort_threshold"]
type = "int"
default = 0
description = "End session after N intent_gate rejections. 0 disables the END tier."
tags = ["guardrail", "budget"]
blast_radius = "low"
mode = "both"

[knob."loop.duplicate_guard_enabled"]
type = "bool"
default = true
description = "Detect identical consecutive tool calls and end the session on repeat."
tags = ["guardrail", "toggle"]
blast_radius = "low"
mode = "both"
implies = ["loop.duplicate_abort", "loop.duplicate_warn_count"]

[knob."loop.duplicate_abort"]
type = "int"
default = 3
description = "End session after N identical consecutive tool calls."
tags = ["guardrail", "budget"]
blast_radius = "low"
mode = "both"
range = [2, 100]

[knob."loop.duplicate_warn_count"]
type = "int"
default = 0
description = "Append WARN nudge after N identical consecutive calls, before END. 0 disables."
tags = ["guardrail"]
blast_radius = "low"
mode = "both"

[knob."loop.loop_detect_enabled"]
type = "bool"
default = false
description = "Structural hash-based loop detector beyond duplicate_guard. Off by default (experimental)."
tags = ["guardrail", "toggle", "experimental"]
blast_radius = "low"
mode = "both"

[knob."loop.loop_detect_threshold"]
type = "int"
default = 5
description = "Fire loop_detect at N consecutive identical signatures."
tags = ["guardrail"]
blast_radius = "low"
mode = "both"

[knob."loop.rumination_enabled"]
type = "bool"
default = false
description = "Detect model reading without writing. Gate arms after threshold; blocks non-write calls."
tags = ["guardrail", "toggle"]
blast_radius = "medium"
mode = "both"
implies = ["loop.rumination_nudge_threshold", "loop.rumination_gate_arm_threshold"]

[knob."loop.rumination_nudge_threshold"]
type = "int"
default = 20
description = "WARN tier for rumination. Percentage of max_turns (e.g. 20 = 20% of max_turns)."
tags = ["guardrail"]
blast_radius = "low"
mode = "both"
range = [0, 100]

[knob."loop.rumination_gate_arm_threshold"]
type = "int"
default = 0
description = "ARM rumination gate at this percentage of max_turns. Blocks non-write calls once armed."
tags = ["guardrail"]
blast_radius = "medium"
mode = "both"

[knob."loop.rumination_gate_max_blocks"]
type = "int"
default = 5
description = "After N gate-blocked calls, end session with current state as final patch. 0 disables."
tags = ["guardrail", "budget"]
blast_radius = "low"
mode = "both"

[knob."loop.done_guard_enabled"]
type = "bool"
default = false
description = "Validate done-claims. Rejects 'I am done' without required preconditions (mutation, verify)."
tags = ["guardrail", "toggle"]
blast_radius = "medium"
mode = "both"
implies = ["loop.done_require_mutation", "loop.done_require_verify"]

[knob."loop.done_require_mutation"]
type = "bool"
default = false
description = "Done claim requires at least one successful write/edit."
tags = ["guardrail"]
blast_radius = "medium"
mode = "both"

[knob."loop.done_require_verify"]
type = "bool"
default = false
description = "Done claim requires a prior verification bash call with substantive output."
tags = ["guardrail"]
blast_radius = "medium"
mode = "both"

[knob."loop.done_verified_bash_min_chars"]
type = "int"
default = 200
description = "Minimum stdout chars for a bash call to count as 'verification' under done_require_verify."
tags = ["guardrail"]
blast_radius = "low"
mode = "both"

[knob."loop.error_ladder_enabled"]
type = "bool"
default = false
description = "Nudge/abort ladder for consecutive tool errors. WARN at error_nudge_threshold, END at error_abort_threshold."
tags = ["guardrail", "toggle"]
blast_radius = "low"
mode = "both"

[knob."loop.error_nudge_threshold"]
type = "int"
default = 3
description = "Inject 'check the error / re-read' nudge after N consecutive tool errors."
tags = ["guardrail"]
blast_radius = "low"
mode = "both"
range = [0, 20]

[knob."loop.error_abort_threshold"]
type = "int"
default = 0
description = "End session after N consecutive tool errors. 0 disables the END tier."
tags = ["guardrail", "budget"]
blast_radius = "low"
mode = "both"

[knob."loop.bash_transforms_universal_enabled"]
type = "bool"
default = true
description = "Apply universal bash rewrites (pip -q, npm --loglevel=error, make -s). Correctness layer."
tags = ["bash-quirks", "toggle", "output-hygiene"]
blast_radius = "medium"
mode = "both"

[knob."loop.bash_transforms_task_format_enabled"]
type = "bool"
default = true
description = "Apply per-runner output flags (pytest --tb=short, etc.). Correctness layer."
tags = ["bash-quirks", "toggle", "output-hygiene"]
blast_radius = "medium"
mode = "both"

[knob."loop.bash_transforms_structured_output_enabled"]
type = "bool"
default = false
description = "Project test runner output to compact passed/failed/errors digest. Raw still sinkable."
tags = ["bash-quirks", "output-hygiene", "toggle"]
blast_radius = "low"
mode = "both"

[knob."loop.bash_transforms_sink_threshold_chars"]
type = "int"
default = 0
description = "Sink bash outputs exceeding N chars to .tool_output/ and show head+tail. 0 = disabled."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"
range = [0, 200000]

[knob."loop.parallel_readonly_enabled"]
type = "bool"
default = false
description = "Dispatch read-only tool calls (read, grep, glob) concurrently within a single turn."
tags = ["tools", "toggle", "experimental"]
blast_radius = "low"
mode = "both"

[knob."loop.parallel_max_workers"]
type = "int"
default = 4
description = "Thread pool size for parallel_readonly_enabled."
tags = ["tools"]
blast_radius = "low"
mode = "both"

[knob."loop.min_turns_before_context"]
type = "int"
default = 2
description = "Turns of raw history before switching to stateful/compact context."
tags = ["context"]
blast_radius = "low"
mode = "both"

[knob."loop.max_transient_retries"]
type = "int"
default = 3
description = "Retry count for transient API errors (connection, timeout)."
tags = ["server", "timing"]
blast_radius = "low"
mode = "both"

[knob."loop.retry_backoff"]
type = "list"
default = [1, 4, 16]
description = "Seconds between transient retries (index = attempt number)."
tags = ["server", "timing"]
blast_radius = "low"
mode = "both"

# ═══════════════════════════════════════════════════════════════════
# Output hygiene (truncation, pagination, trace budgets)
# ═══════════════════════════════════════════════════════════════════

[knob."output.max_output_chars"]
type = "int"
default = 80000
description = "Per-tool-result char cap after filters. Large enough for typical source-file reads to come back whole."
tags = ["output-hygiene", "budget"]
blast_radius = "medium"
mode = "both"
range = [5000, 500000]
affects = ["context-fill", "truncation-rate"]

[knob."output.truncate_head_ratio"]
type = "float"
default = 0.6
description = "Fraction of truncation budget allocated to head vs tail. 0.4 = 40% head / 60% tail (errors typically at tail)."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"
range = [0.0, 1.0]

[knob."output.truncate_head_lines"]
type = "int"
default = 200
description = "Minimum head lines preserved when char-budget truncation fires."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"

[knob."output.truncate_tail_lines"]
type = "int"
default = 100
description = "Minimum tail lines preserved when char-budget truncation fires."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"

[knob."output.recent_tool_results_chars"]
type = "int"
default = 30000
description = "Rolling window budget for recent full tool results in stateful/compact context strategies."
tags = ["context", "budget"]
blast_radius = "low"
mode = "both"

[knob."output.pretest_head_chars"]
type = "int"
default = 2000
description = "Head chars of pretest output injected into first user message at session start."
tags = ["context"]
blast_radius = "low"
mode = "both"

[knob."output.pretest_tail_chars"]
type = "int"
default = 1500
description = "Tail chars of pretest output injected into first user message at session start."
tags = ["context"]
blast_radius = "low"
mode = "both"

[knob."output.args_summary_chars"]
type = "int"
default = 80
description = "Per-value char limit in tool-call args summaries (trace + context rendering)."
tags = ["output-hygiene", "observability"]
blast_radius = "low"
mode = "both"

[knob."output.trace_args_summary_chars"]
type = "int"
default = 200
description = "Args-summary cap in trace.jsonl events (durable, tighter than live rendering)."
tags = ["observability"]
blast_radius = "low"
mode = "both"

[knob."output.trace_reasoning_store_chars"]
type = "int"
default = 800
description = "Max chars of model reasoning stored per tool call in .trace.jsonl."
tags = ["observability", "context"]
blast_radius = "low"
mode = "both"

[knob."output.trace_stub_chars"]
type = "int"
default = 200
description = "Per-entry stub length in the trace section of the prompt."
tags = ["context"]
blast_radius = "low"
mode = "both"

[knob."output.trace_reasoning_chars"]
type = "int"
default = 150
description = "Reasoning snippet length in trace entries (compact/yuj/compound contexts)."
tags = ["context"]
blast_radius = "low"
mode = "both"

[knob."output.solver_trace_lines"]
type = "int"
default = 50
description = "Tail entries kept from state.json 'trace' field."
tags = ["context"]
blast_radius = "low"
mode = "both"

[knob."output.solver_evidence_lines"]
type = "int"
default = 30
description = "Tail entries kept from state.json 'evidence' field."
tags = ["context"]
blast_radius = "low"
mode = "both"

[knob."output.solver_inference_lines"]
type = "int"
default = 20
description = "Tail entries kept from state.json 'inference' field."
tags = ["context"]
blast_radius = "low"
mode = "both"

# ═══════════════════════════════════════════════════════════════════
# Tools (dispatch, timeouts, sandbox, edit policy, search pagination)
# ═══════════════════════════════════════════════════════════════════

[knob."tools.bash_timeout"]
type = "int"
default = 60
description = "Seconds before a bash tool call is killed."
tags = ["tools", "timing"]
blast_radius = "medium"
mode = "both"
range = [10, 600]

[knob."tools.grep_timeout"]
type = "int"
default = 30
description = "Seconds before a grep tool call is killed."
tags = ["tools", "timing"]
blast_radius = "low"
mode = "both"

[knob."tools.pretest_timeout"]
type = "int"
default = 240
description = "Seconds before the pretest script is killed (docker test suites can be slow)."
tags = ["tools", "timing"]
blast_radius = "low"
mode = "both"

[knob."tools.sandbox_bash"]
type = "bool"
default = true
description = "Run every bash call inside a bwrap mount namespace (cwd-only writable). LOAD-BEARING safety rail."
tags = ["safety", "toggle", "tools"]
blast_radius = "high"
mode = "both"
affects = ["isolation", "escape-surface"]

[knob."tools.strip_ansi"]
type = "bool"
default = true
description = "Strip ANSI escape sequences from bash output."
tags = ["output-hygiene", "bash-quirks", "toggle"]
blast_radius = "low"
mode = "both"

[knob."tools.collapse_blank_lines"]
type = "bool"
default = true
description = "Collapse 3+ consecutive newlines to 2 in bash output."
tags = ["output-hygiene", "toggle"]
blast_radius = "low"
mode = "both"

[knob."tools.collapse_duplicate_lines"]
type = "bool"
default = true
description = "Collapse runs of byte-identical consecutive lines into '<line> [×N]'."
tags = ["output-hygiene", "toggle"]
blast_radius = "low"
mode = "both"

[knob."tools.collapse_similar_lines"]
type = "bool"
default = true
description = "Collapse runs of structurally similar lines; fires only when output > 50% of max_output_chars."
tags = ["output-hygiene", "toggle"]
blast_radius = "low"
mode = "both"

[knob."tools.search_pagination_enabled"]
type = "bool"
default = true
description = "Wrap grep/glob output in <search_result/> with total/shown/page attributes for explicit paging."
tags = ["output-hygiene", "toggle", "tools"]
blast_radius = "low"
mode = "both"

[knob."tools.grep_max_matches_per_page"]
type = "int"
default = 25
description = "Lines per grep page when search_pagination_enabled=true."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"

[knob."tools.glob_max_matches_per_page"]
type = "int"
default = 25
description = "Paths per glob page when search_pagination_enabled=true."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"

[knob."tools.sink_head_bytes"]
type = "int"
default = 1000
description = "Head bytes shown from a sunk bash result (full written to .tool_output/)."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"

[knob."tools.sink_tail_bytes"]
type = "int"
default = 1000
description = "Tail bytes shown from a sunk bash result."
tags = ["output-hygiene"]
blast_radius = "low"
mode = "both"

[knob."tools.edit_strict_match"]
type = "bool"
default = true
description = "Edit tool: require exact string match; on miss, return ranked near-miss candidates."
tags = ["edit", "toggle"]
