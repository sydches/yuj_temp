# ═══════════════════════════════════════════════════════════════════
# Presets (curated bundles — intent-translator consumers match here first)
# ═══════════════════════════════════════════════════════════════════

[preset.quiet]
description = "Minimum verbosity, maximum context-frugality. Strip and truncate aggressively."
applies = { "output.truncate_head_ratio" = 0.4, "output.max_output_chars" = 60000, "loop.bash_transforms_structured_output_enabled" = true, "loop.bash_transforms_sink_threshold_chars" = 20000 }
mode = "both"
tags = ["output-hygiene", "context"]

[preset.paranoid]
description = "Every Bucket B guardrail enabled with tuned thresholds (= configs/full.toml). Use for stuck-model scenarios."
applies = { "loop.duplicate_guard_enabled" = true, "loop.duplicate_warn_count" = 2, "loop.duplicate_abort" = 80, "loop.require_intent" = true, "loop.intent_grace_turns" = 3, "loop.intent_abort_threshold" = 10, "loop.rumination_enabled" = true, "loop.rumination_nudge_threshold" = 20, "loop.rumination_gate_arm_threshold" = 30, "loop.rumination_gate_max_blocks" = 5, "loop.error_ladder_enabled" = true, "loop.error_nudge_threshold" = 3, "loop.error_abort_threshold" = 6, "loop.done_guard_enabled" = true, "loop.done_require_mutation" = true, "loop.done_require_verify" = true, "loop.loop_detect_enabled" = true, "loop.loop_detect_threshold" = 5 }
mode = "both"
tags = ["guardrail"]
equivalent_to = "configs/full.toml"

[preset.permissive]
description = "All Bucket B guardrails off (= configs/substantive.toml). Correctness layer stays on. Scientific baseline."
applies = { "loop.require_intent" = false, "loop.duplicate_guard_enabled" = false, "loop.done_guard_enabled" = false, "loop.rumination_enabled" = false, "loop.error_ladder_enabled" = false, "loop.loop_detect_enabled" = false, "loop.bash_transforms_universal_enabled" = true, "loop.bash_transforms_task_format_enabled" = true }
mode = "both"
tags = ["guardrail"]
equivalent_to = "configs/substantive.toml"

[preset.fast]
description = "Short sessions, low turn budget. For quick smoke runs."
applies = { "loop.max_turns" = 40, "loop.max_sessions" = 2 }
mode = "both"
tags = ["budget"]

[preset.debug]
description = "Loose budgets, verbose observability. For debugging a single task."
applies = { "loop.max_turns" = 400, "loop.max_sessions" = 3, "output.max_output_chars" = 150000, "output.trace_reasoning_store_chars" = 2000 }
mode = "assistant"
tags = ["observability"]

[preset.reproducible]
description = "Lock independent variables for measurement runs. Rejects experimental knobs."
applies = { "tools.sandbox_bash" = true, "tools.strip_ansi" = true, "loop.bash_transforms_universal_enabled" = true, "loop.bash_transforms_task_format_enabled" = true }
mode = "measurement"
tags = ["safety", "reproducibility"]

[preset.post-edit-python]
description = "Enable post-edit py_compile check with rollback on failure. Also populate post_edit_check.checks with the desired command."
applies = { "post_edit_check.enabled" = true, "post_edit_check.timeout" = 10 }
mode = "both"
tags = ["post-edit"]

# ═══════════════════════════════════════════════════════════════════
# Meta (self-description for consumers)
# ═══════════════════════════════════════════════════════════════════

[meta]
authoritative_sources = ["config.toml"]
overlay_sources = ["configs/*.toml", "configs/toggles/*.toml", "configs/doe/*.toml"]
mutable_by_skill = "config.local.toml"
never_edit_by_skill = ["config.toml", "profiles/**", "bash_quirks/**", "language_quirks/**", "docs/commandments*.md", "config/**"]
generator = "scripts/build_knob_catalog.py"
validator_cmd = "python3 scripts/build_knob_catalog.py validate"
catalog_version = 1
