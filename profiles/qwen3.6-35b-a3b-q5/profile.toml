[profile]
format_version = 1
canonical_version = "openai-v1"
name = "qwen3.6-35b-a3b-q5"
family = "qwen3.6"
quant = "UD-Q5_K_XL"
inherits = "_base"

[model]
context_size = 262144
chat_template = "chatml"
supports_tool_calls = true
supports_system_role = true

[tokens]
method = "chars_div_4"
tokenizer = ""

[capacity]
preamble = ""
max_tools = 7
simplify_schemas = false

[normalize]
rules = ["rules.toml"]
modules = []

[denormalize]
rules = ["rules.toml"]
modules = ["behavioral.py"]

# Behavioral suffix injected after the Commandments header in the
# system prompt (operationalization of the four commandments — the
# "do this, not that" layer). Task-agnostic. Loaded by behavioral.py
# via load_profile_behavioral() so the text lives in data, not code.
#
# tool_call_style governs how the profile formats function calls on
# the wire: "openai_json" is the llama-server/Qwen default and is
# what this profile ships; "qwen_xml" and "gemini_native" are future
# options for per-model tool-call format experiments (Qwen Code-
# style <tool_call> blocks, etc.).
#
# reminder_placement controls where the behavioral suffix lands:
# "system" appends to the system message (current behavior);
# "user_tail" would append to the last user message (Aider pattern).
[behavioral]
tool_call_style = "openai_json"
reminder_placement = "system"
# Baseline suffix — matches qwen3.5-9b exactly so Q4/Q5 comparator tests
# isolate the quant effect. The sharpened rule-5 + rule-10 variant was
# falsified (see doe_log 20260421_060000_qwen36_transcript_diagnosis.md);
# reverting here means this profile serves as the original nzF2P-6 DOE
# Cell A baseline matching Q35 character-for-character on behavioral text.
suffix = """

## Operational rules

Constraints, not advice.

1. **Test suite is the only verdict.** Run it. `python -c`, imports, `echo` are not verification.
2. **Test file = interface contract.** Read it once, early.
3. **Never modify existing test files.**
4. **Last action must be a test run.** No fresh verdict = not done.
5. **First action: mutate or test.** Pretest verdict is in context. Do not list/read/grep first.
6. **Iterate, not rewrite.** Read the error. Make a targeted edit. Do not start over.
7. **No re-runs without intervening mutation.** Flag variations don't count.
8. **Sessions resume.** Continue from where you stopped. Do not restart.
9. **Batch independent reads.** You may emit multiple read/glob/grep calls in one turn; the harness runs them concurrently and returns all results together. One call per turn wastes context when you already know the set of files to inspect."""

[server]
model_path = "~/models/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf"
ctx_size = 32768
flash_attn = true
cache_type_k = "q8_0"
cache_type_v = "q8_0"
jinja = true
reasoning_mode = "think"
reasoning_disable_flag = "--reasoning-budget 0"
# Hybrid GPU+CPU split for 4080M (12 GB VRAM) + 14900HX (64 GB DDR5).
# --n-cpu-moe 32 offloads first 32 layers' routed experts to CPU;
# attention + shared expert + router + embed + last 8 layers' experts
# stay on GPU. P-core pinning via cpu-mask 0x00FF + cpu-strict 1.
# See docs/local_model_observations.md for the full budget analysis.
extra_flags = "--n-cpu-moe 32 --cpu-mask 0x00FF --cpu-strict 1 -b 2048 -ub 1024 --mmap"

# Qwen-official sampling presets (server-side defaults, not sent by harness).
# Source: Qwen/Qwen3-8B model card generation_config.json + community testing.
# These are passed as llama-server CLI flags at launch time.
[sampling]
temperature = 0.7           # Qwen non-thinking preset (default 0.8 too loose)
top_k = 20                  # model-specific — half llama-server default of 40
top_p = 0.8                 # Qwen non-thinking preset (default 0.95 too loose)
min_p = 0.0                 # Qwen official leaves at 0; community suggests 0.05 for creative
presence_penalty = 0.0      # 0.0 for coding; 1.5 for general/creative (anti-repetition)
n_predict = 32768           # per-completion generation cap

[provenance]
generated = "2026-04-21"
llama_server = "--reasoning-budget 0 --n-cpu-moe 32"
model_file = "Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf"
model_sha256 = ""
process_version = "1"
self_profiled = false
scenario_results = "Q5_K_XL comparator for the Q4_K_XL zero-mutation finding (see doe_log 20260421_060000_qwen36_transcript_diagnosis.md). Profile differs from qwen3.6-35b-a3b only in name, quant, model_path; behavioral suffix identical to qwen3.5-9b for clean one-variable-change test."

