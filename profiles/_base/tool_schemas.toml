# Tool schemas — parameter shapes are invariant across description modes.
#
# Mode-specific prose lives in profiles/_base/tool_descriptions/<mode>/<tool>.txt
# and is injected at load time by scripts/llm_solver/harness/schemas.py.
#
# To add a new tool: add a [[tools]] entry here and a matching <name>.txt in
# every description mode directory. To add a new mode: create a new directory
# under tool_descriptions/ with one .txt file per tool name.

[[tools]]
name = "bash"
required = ["cmd"]
properties = { cmd = { type = "string" } }

[[tools]]
name = "read"
required = ["path"]
properties = { path = { type = "string" }, offset = { type = "integer" }, limit = { type = "integer" } }

[[tools]]
name = "write"
required = ["path", "content"]
properties = { path = { type = "string" }, content = { type = "string" } }

[[tools]]
name = "edit"
required = ["path", "old_str", "new_str"]
properties = { path = { type = "string" }, old_str = { type = "string" }, new_str = { type = "string" } }

[[tools]]
name = "glob"
required = ["pattern"]
properties = { pattern = { type = "string" }, path = { type = "string" }, page = { type = "integer" } }

[[tools]]
name = "grep"
required = ["pattern"]
properties = { pattern = { type = "string" }, path = { type = "string" }, glob = { type = "string" }, page = { type = "integer" } }

[[tools]]
name = "done"
required = []
[tools.properties]
[tools.properties.message]
type = "string"
